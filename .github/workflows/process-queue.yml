name: Process AidTrace Queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aidtrace-process-queue
  cancel-in-progress: false

jobs:
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      AIDTRACE_APP_URL: ${{ vars.AIDTRACE_APP_URL || 'https://aidtrace-rastroayuda.vercel.app' }}
      AIDTRACE_QUEUE_WORKER_TOKEN: ${{ secrets.AIDTRACE_QUEUE_WORKER_TOKEN }}
    steps:
      - name: Process queued Celo writes
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AIDTRACE_QUEUE_WORKER_TOKEN}" ]; then
            echo "Missing GitHub secret: AIDTRACE_QUEUE_WORKER_TOKEN"
            exit 1
          fi

          response="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --retry 2 \
            --retry-delay 5 \
            --max-time 120 \
            --header "Authorization: Bearer ${AIDTRACE_QUEUE_WORKER_TOKEN}" \
            "${AIDTRACE_APP_URL%/}/api/process-queue?limit=3")"

          echo "${response}"
